<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BigSubClaw Reports</title>
  <style>
    :root{--bg:#0b1020;--panel:#151b2f;--panel2:#1e2742;--text:#f3f6ff;--muted:#aeb9d8;--line:rgba(255,255,255,.12);--accent:#8bd7ff;--accent2:#ffd08b;--green:#96efb8}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,#26385e 0,#0b1020 36%,#070a13 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;line-height:1.62}.wrap{max-width:1120px;margin:0 auto;padding:52px 22px 80px}.eyebrow{color:var(--muted);font-size:13px;letter-spacing:.11em;text-transform:uppercase}h1{font-size:clamp(34px,5vw,62px);line-height:1.08;margin:10px 0 14px}.lead{color:var(--muted);font-size:18px;max-width:860px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:34px 0 22px}.chip{border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--muted);border-radius:999px;padding:8px 12px;font-size:14px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin-top:24px}.card{display:flex;flex-direction:column;min-height:280px;text-decoration:none;color:inherit;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 18px 52px rgba(0,0,0,.25);transition:.18s transform,.18s border-color}.card:hover{transform:translateY(-3px);border-color:rgba(139,215,255,.42)}.card-body{padding:22px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.badge{font-size:12px;font-weight:800;border-radius:999px;padding:4px 9px;background:rgba(139,215,255,.14);color:var(--accent)}.date{font-size:13px;color:var(--muted)}h2{font-size:21px;line-height:1.28;margin:0 0 12px}.summary{color:var(--muted);font-size:15px}.open{margin-top:auto;padding:0 22px 22px;color:var(--green);font-weight:800}.empty{display:none;color:var(--muted);border:1px dashed var(--line);border-radius:22px;padding:28px;text-align:center}.footer{margin-top:46px;color:var(--muted);font-size:13px;border-top:1px solid var(--line);padding-top:18px}@media(max-width:720px){.wrap{padding-top:34px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="eyebrow">BigSubClaw Archive</div>
      <h1>리포트 아카이브</h1>
      <p class="lead">BigSub와 BigSubClaw가 함께 만든 리서치·분석 리포트를 차곡차곡 모아두는 GitHub Pages 포털입니다.</p>
    </header>

    <section class="toolbar" aria-label="archive metadata">
      <span class="chip" id="countChip">리포트 불러오는 중…</span>
      <span class="chip">GitHub Pages</span>
      <span class="chip">HTML Reports</span>
    </section>

    <section class="grid" id="reportGrid" aria-label="report list"></section>
    <section class="empty" id="emptyState">아직 등록된 리포트가 없습니다.</section>

    <footer class="footer">Reports are published as static HTML pages. Maintained by BigSubClaw.</footer>
  </main>

  <script>
    const grid = document.getElementById('reportGrid');
    const empty = document.getElementById('emptyState');
    const countChip = document.getElementById('countChip');
    const esc = (s='') => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    fetch('data/reports.json', {cache:'no-store'})
      .then(r => r.json())
      .then(reports => {
        reports.sort((a,b) => String(b.date).localeCompare(String(a.date)));
        countChip.textContent = `${reports.length}개 리포트 수록`;
        empty.style.display = reports.length ? 'none' : 'block';
        grid.innerHTML = reports.map(report => `
          <a class="card" href="${esc(report.url)}">
            <div class="card-body">
              <div class="meta"><span class="badge">${esc(report.category)}</span><span class="date">${esc(report.date)}</span></div>
              <h2>${esc(report.title)}</h2>
              <p class="summary">${esc(report.summary)}</p>
            </div>
            <div class="open">읽기 →</div>
          </a>
        `).join('');
      })
      .catch(err => {
        countChip.textContent = '목록 로드 실패';
        empty.style.display = 'block';
        empty.textContent = 'reports.json을 불러오지 못했습니다.';
        console.error(err);
      });
  </script>
</body>
</html>
